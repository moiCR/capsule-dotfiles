# Capsule dotfiles hyprlock config
source = /home/moi/pro/dotfiles/hypr/hyprlock-colors.conf
source = /home/moi/pro/dotfiles/hypr/hyprlock-lang.conf

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.7
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 220, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = $accent
    inner_color = $bg
    font_color = $fg
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = $placeholder_text
    hide_input = false
    rounding = -1
    check_color = $accent
    fail_color = $red
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +%R)"
    color = $fg
    font_size = 64
    font_family = JetBrains Mono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = $greeting_text
    color = $fgMuted
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, 180
    halign = center
    valign = center
}
